<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<main>

<section class="card p-4 shadow" style="width: 350px;">

<h2 class="text-center mb-3">Welcome Back!</h2>

<form id="login-form" action="#">

<fieldset>

<legend>Secure Login</legend>

<label for="email" class="form-label">Email Address</label>
<input type="email" id="email" class="form-control mb-3" required>

<label for="password" class="form-label">Password</label>
<input type="password" id="password" class="form-control mb-3" minlength="8" required>

<button type="submit" id="login" class="btn btn-primary w-100">Log In</button>

</fieldset>

<div id="message-container"></div>

</form>

</section>

</main>

<script src="login.js" defer></script>

</body>
</html>
